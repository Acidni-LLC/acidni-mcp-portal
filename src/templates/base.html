<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MCP Portal{% endblock %} - Acidni</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        acidni: {
                            dark: '#1a1a2e',
                            primary: '#16213e',
                            accent: '#0f3460',
                            highlight: '#e94560',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Custom styles -->
    <style>
        .copy-btn {
            transition: all 0.2s ease;
        }
        .copy-btn:hover {
            transform: scale(1.05);
        }
        .copy-btn.copied {
            background-color: #10B981 !important;
        }
        .server-card {
            transition: all 0.3s ease;
        }
        .server-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.15);
        }
        .code-block {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="gradient-bg min-h-screen text-white">
    <!-- Navigation -->
    <nav class="border-b border-white/10 glass-effect">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🔌</span>
                    <a href="/" class="text-xl font-bold text-white hover:text-acidni-highlight transition-colors">
                        MCP Portal
                    </a>
                    <span class="text-white/50 text-sm">by Acidni</span>
                </div>
                
                <div class="flex items-center space-x-4">
                    {% if user %}
                        <span class="text-white/70 text-sm">
                            {{ user.name or user.email }}
                        </span>
                        <a href="/logout" 
                           class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 transition-colors text-sm">
                            Sign Out
                        </a>
                    {% else %}
                        <a href="/login"
                           class="px-4 py-2 rounded-lg bg-acidni-highlight hover:bg-red-500 transition-colors text-sm font-medium">
                            Sign In
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="border-t border-white/10 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row justify-between items-center text-white/50 text-sm">
                <p>&copy; 2026 Acidni LLC. All rights reserved.</p>
                <p class="mt-2 sm:mt-0">
                    MCP Portal v{{ settings.app_version }}
                </p>
            </div>
        </div>
    </footer>
    
    <!-- Copy functionality -->
    <script>
        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerText;
                button.classList.add('copied');
                button.innerText = 'Copied!';
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerText = originalText;
                }, 2000);
            });
        }
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
